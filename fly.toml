# fly.toml app configuration file generated for finanzas-prueba on 2026-02-24T15:54:32Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'finanzas-prueba'
primary_region = 'gru'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[env]
  NODE_ENV = "production"
  PORT = "8080"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

# Volumen persistente para backups SQL
# Créalo antes del primer deploy:
#   fly volumes create finanzas_backups --region gru --size 1
[[mounts]]
  source = "finanzas_backups"
  destination = "/app/backups"

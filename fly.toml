# fly.toml — Finanzas Rincón Integral
# app = 'finanzas-prueba' generado por fly launch — no cambiar

app = 'finanzas-prueba'
primary_region = 'lax'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[env]
  NODE_ENV = "production"
  PORT = "5000"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

# Volumen persistente para backups SQL (1 GB gratis en Fly.io)
# Créalo antes del primer deploy:
#   fly volumes create finanzas_backups --region lax --size 1
[[mounts]]
  source = "finanzas_backups"
  destination = "/app/backups"
